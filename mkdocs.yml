site_name: MetaBot
site_url: https://xvirobotics.com/metabot
site_description: MetaBot Personal Edition — a self-hosted Core Console for Codex, Kimi Code and Claude Code, reachable from Web, Feishu/Lark, Telegram and WeChat.
repo_url: https://github.com/xvirobotics/metabot
repo_name: xvirobotics/metabot
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: docs/overrides
  font: false
  palette:
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - content.tabs.link
    - search.highlight
    - search.suggest
  icon:
    repo: fontawesome/brands/github

extra_css:
  - assets/stylesheets/docs-theme.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search
  - i18n:
      # Files with no language suffix (index.md, troubleshooting.md, …) are English —
      # set en as the default locale to match that convention. Chinese
      # translations use the `.zh.md` suffix and override per file.
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: zh
          name: 中文
          build: true
          nav:
            - 首页: index.md
            - 快速开始:
              - 安装: getting-started/installation.md
              - 快速配置: getting-started/quick-setup.md
              - 飞书应用配置: getting-started/feishu-app-setup.md
            - 产品:
              - Core Console: features/web-ui.md
              - 多 Bot 与引擎: configuration/multi-bot.md
              - MetaMemory: features/metamemory.md
              - MetaSkill: features/metaskill.md
              - Agent 团队: features/agent-teams.md
              - 微信接入: features/wechat.md
            - 参考:
              - 聊天命令: usage/chat-commands.md
              - metabot CLI: reference/cli-metabot.md
              - REST API: reference/api.md
              - 环境变量: configuration/environment-variables.md
              - 故障排除: troubleshooting.md
            - 运维与开发:
              - 架构: concepts/architecture.md
              - 安全: concepts/security.md
              - 生产部署: deployment/production.md
              - 贡献指南: development/contributing.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/xvirobotics/metabot
  alternate:
    - name: English
      link: /metabot/
      lang: en
    - name: 中文
      link: /metabot/zh/
      lang: zh

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Setup: getting-started/quick-setup.md
    - Feishu App Setup: getting-started/feishu-app-setup.md
  - Product:
    - Core Console: features/web-ui.md
    - Multi-Bot and Engines: configuration/multi-bot.md
    - MetaMemory: features/metamemory.md
    - MetaSkill: features/metaskill.md
    - Agent Teams: features/agent-teams.md
    - WeChat: features/wechat.md
  - Reference:
    - Chat Commands: usage/chat-commands.md
    - metabot CLI: reference/cli-metabot.md
    - REST API: reference/api.md
    - Environment Variables: configuration/environment-variables.md
    - Troubleshooting: troubleshooting.md
  - Operations and Development:
    - Architecture: concepts/architecture.md
    - Security: concepts/security.md
    - Production: deployment/production.md
    - Contributing: development/contributing.md
